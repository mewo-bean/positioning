<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Два логотипа 100×100</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="logo mitsubishi">
        <div class="diamond top"></div>
        <div class="diamond left"></div>
        <div class="diamond right"></div>
    </div>

    <div class="logo microsoft">
        <div class="ms-square ms-tl"></div>
        <div class="ms-square ms-tr"></div>
        <div class="ms-square ms-bl"></div>
        <div class="ms-square ms-br"></div>
    </div>

    <title>Модальное окно</title>
    <link rel="stylesheet" href="styles.css">
    
    <button class="open-button" id="openBtn">Открыть модальное окно</button>

    <div class="overlay" id="overlay">
        <div class="modal">
            <button class="close-button" id="closeBtn">✝</button>
            
            <h2>Это модальное окно</h2>

            <div>
                <input type="checkbox" id="acc1">
                <label for="acc1"></label>
                <div class="accordion">
                    <p>Never gonna give you up</p>
                </accordion>
            </div>

            <div>
                <input type="checkbox" id="acc2">
                <label for="acc2"></label>
                <div class="accordion">
                    <p>Never gonna let you down</p>
                </accordion>
            </div>

            <div>
                <input type="checkbox" id="acc3">
                <label for="acc3"></label>
                <div class="accordion">
                    <p>Never gonna run around and desert you</p>
                </accordion>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
